<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natural Gate</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --dark-navy: #0F1729;
    --navy: #1B2845;
    --deep-blue: #065A82;
    --teal: #0891B2;
    --orange: #F6821F;
    --white: #FFFFFF;
    --off-white: #F0F4F8;
    --light-gray: #94A3B8;
    --mid-gray: #64748B;
    --dark-text: #1E293B;
    --card-bg: #1E2D4A;
    --terminal-bg: #0A0F1C;
    --success: #10B981;
    --error: #EF4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark-navy);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%; right: -20%;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(8,145,178,0.08) 0%, transparent 70%);
    border-radius: 50%;
    animation: float 20s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%; left: -10%;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(246,130,31,0.06) 0%, transparent 70%);
    border-radius: 50%;
    animation: float 25s ease-in-out infinite reverse;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -40px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.5rem;
    animation: slideDown 0.6s ease-out;
  }
  .logo {
    width: 40px; height: 40px;
    background: var(--orange);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 20px rgba(246,130,31,0.3);
  }
  .header h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header h1 span { color: var(--orange); }
  .tagline {
    color: var(--mid-gray);
    font-size: 0.9rem;
    margin-bottom: 2.5rem;
    padding-left: 56px;
    animation: slideDown 0.6s ease-out 0.1s both;
  }

  .input-section {
    animation: slideUp 0.5s ease-out 0.2s both;
  }
  .input-wrapper {
    position: relative;
    display: flex;
    gap: 0.5rem;
    align-items: stretch;
  }
  .query-input {
    flex: 1;
    background: var(--card-bg);
    border: 1.5px solid rgba(148,163,184,0.15);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .query-input::placeholder { color: var(--mid-gray); }
  .query-input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(8,145,178,0.15);
  }
  .send-btn {
    background: var(--orange);
    border: none;
    border-radius: 12px;
    padding: 0 1.5rem;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .send-btn:hover { background: #e5750f; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(246,130,31,0.4); }
  .send-btn:active { transform: translateY(0); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 18px; height: 18px; }

  .options-row {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-top: 0.75rem;
    padding-left: 0.25rem;
  }
  .option-toggle {
    display: flex; align-items: center; gap: 0.5rem;
    cursor: pointer;
    user-select: none;
    color: var(--light-gray);
    font-size: 0.82rem;
    transition: color 0.2s;
  }
  .option-toggle:hover { color: var(--white); }
  .toggle-track {
    width: 36px; height: 20px;
    background: var(--card-bg);
    border: 1.5px solid rgba(148,163,184,0.2);
    border-radius: 10px;
    position: relative;
    transition: all 0.3s;
  }
  .toggle-track.active {
    background: var(--teal);
    border-color: var(--teal);
  }
  .toggle-thumb {
    width: 14px; height: 14px;
    background: var(--white);
    border-radius: 50%;
    position: absolute;
    top: 2px; left: 2px;
    transition: transform 0.3s;
  }
  .toggle-track.active .toggle-thumb { transform: translateX(16px); }

  .examples {
    margin-top: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    animation: slideUp 0.5s ease-out 0.35s both;
  }
  .examples-label {
    width: 100%;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--mid-gray);
    margin-bottom: 0.25rem;
  }
  .example-chip {
    background: rgba(30,45,74,0.6);
    border: 1px solid rgba(148,163,184,0.1);
    border-radius: 8px;
    padding: 0.45rem 0.85rem;
    color: var(--light-gray);
    font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
  }
  .example-chip:hover {
    background: var(--card-bg);
    border-color: var(--teal);
    color: var(--teal);
    transform: translateY(-1px);
  }

  .results-area {
    margin-top: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .result-card {
    background: var(--card-bg);
    border: 1px solid rgba(148,163,184,0.08);
    border-radius: 14px;
    overflow: hidden;
    animation: fadeIn 0.4s ease-out;
  }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.25rem;
    background: rgba(10,15,28,0.4);
    border-bottom: 1px solid rgba(148,163,184,0.06);
  }
  .result-query {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--orange);
  }
  .result-meta {
    display: flex; gap: 1rem;
    font-size: 0.75rem;
    color: var(--mid-gray);
  }
  .result-meta .method-badge {
    background: rgba(8,145,178,0.15);
    color: var(--teal);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }

  .translation-row {
    padding: 0.6rem 1.25rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--teal);
    background: rgba(8,145,178,0.04);
    border-bottom: 1px solid rgba(148,163,184,0.06);
    display: flex; align-items: center; gap: 0.5rem;
  }
  .translation-row .arrow { color: var(--mid-gray); }

  .result-body {
    padding: 1rem 1.25rem;
  }
  .result-body pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--light-gray);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 400px;
    overflow-y: auto;
  }
  .result-body pre::-webkit-scrollbar { width: 6px; }
  .result-body pre::-webkit-scrollbar-track { background: transparent; }
  .result-body pre::-webkit-scrollbar-thumb { background: var(--mid-gray); border-radius: 3px; }

  .summary-section {
    padding: 1rem 1.25rem;
    border-top: 1px solid rgba(148,163,184,0.06);
    background: rgba(8,145,178,0.03);
  }
  .summary-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--teal);
    margin-bottom: 0.4rem;
  }
  .summary-text {
    font-size: 0.9rem;
    color: var(--off-white);
    line-height: 1.5;
  }

  .loading-card {
    background: var(--card-bg);
    border: 1px solid rgba(148,163,184,0.08);
    border-radius: 14px;
    padding: 2rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    animation: fadeIn 0.3s ease-out;
  }
  .loading-dots { display: flex; gap: 4px; }
  .loading-dots span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--teal);
    animation: bounce 1.4s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.16s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.32s; }
  .loading-text { color: var(--mid-gray); font-size: 0.9rem; }

  .error-card {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 14px;
    padding: 1.25rem;
    color: var(--error);
    font-size: 0.9rem;
    animation: fadeIn 0.3s ease-out;
  }

  @keyframes slideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  @media (max-width: 600px) {
    .app { padding: 1.25rem 1rem 3rem; }
    .header h1 { font-size: 1.3rem; }
    .input-wrapper { flex-direction: column; }
    .send-btn { padding: 0.85rem; justify-content: center; border-radius: 10px; }
    .result-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    .examples { gap: 0.4rem; }
    .example-chip { font-size: 0.72rem; padding: 0.35rem 0.65rem; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">⚡</div>
    <h1><span>Natural</span> Gate</h1>
  </div>
  <p class="tagline">Ask about our car fleet in natural language</p>

  <div class="input-section">
    <div class="input-wrapper">
      <input type="text" class="query-input" id="queryInput"
        placeholder='Try: "show me available SUVs in Valencia"'
        autocomplete="off" spellcheck="false">
      <button class="send-btn" id="sendBtn" onclick="sendQuery()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Send
      </button>
    </div>

    <div class="options-row">
      <label class="option-toggle" onclick="toggleExplain()">
        <div class="toggle-track" id="explainToggle">
          <div class="toggle-thumb"></div>
        </div>
        AI Summary
      </label>
    </div>
  </div>

  <div class="examples">
    <span class="examples-label">Try these</span>
    <span class="example-chip" onclick="tryExample(this)">show me available SUVs in Valencia</span>
    <span class="example-chip" onclick="tryExample(this)">list BMWs under 80 euros per day</span>
    <span class="example-chip" onclick="tryExample(this)">how many reservations do we have?</span>
    <span class="example-chip" onclick="tryExample(this)">find reservation for maria</span>
    <span class="example-chip" onclick="tryExample(this)">cancel reservation RES-A1B2C3</span>
    <span class="example-chip" onclick="tryExample(this)">show me electric cars</span>
    <span class="example-chip" onclick="tryExample(this)">what is our total revenue?</span>
  </div>

  <div class="results-area" id="results"></div>
</div>

<script>
  const GATEWAY_URL = "https://naturalgate.rubenb-signaturit.workers.dev";
  let explainEnabled = false;

  function toggleExplain() {
    explainEnabled = !explainEnabled;
    document.getElementById('explainToggle').classList.toggle('active', explainEnabled);
  }

  function tryExample(el) {
    document.getElementById('queryInput').value = el.textContent;
    sendQuery();
  }

  document.getElementById('queryInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendQuery();
  });

  async function sendQuery() {
    const input = document.getElementById('queryInput');
    const query = input.value.trim();
    if (!query) return;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    const results = document.getElementById('results');

    const loadingId = 'loading-' + Date.now();
    results.insertAdjacentHTML('afterbegin', `
      <div class="loading-card" id="${loadingId}">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <span class="loading-text">Translating "${query}" …</span>
      </div>
    `);

    try {
      const url = `${GATEWAY_URL}/ask${explainEnabled ? '?explain=true' : ''}`;
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query }),
      });

      const data = await response.json();

      document.getElementById(loadingId)?.remove();

      if (data.error) {
        results.insertAdjacentHTML('afterbegin', `
          <div class="error-card">⚠ ${escapeHtml(data.error)}${data.suggestion ? '<br><small>' + escapeHtml(data.suggestion) + '</small>' : ''}</div>
        `);
      } else {
        const translated = data.translated_to
          ? `${data.translated_to.method} ${data.translated_to.path}`
          : '';
        const elapsed = data.meta?.elapsed_ms ? `${data.meta.elapsed_ms}ms` : '';

        let html = `<div class="result-card">
          <div class="result-header">
            <span class="result-query">"${escapeHtml(query)}"</span>
            <div class="result-meta">
              ${elapsed ? `<span>⏱ ${elapsed}</span>` : ''}
            </div>
          </div>`;

        if (translated) {
          html += `<div class="translation-row">
            <span class="arrow">→</span>
            <span class="method-badge">${escapeHtml(data.translated_to.method)}</span>
            <span>${escapeHtml(data.translated_to.path)}</span>
          </div>`;
        }

        html += `<div class="result-body"><pre>${syntaxHighlight(data.data)}</pre></div>`;

        if (data.summary) {
          html += `<div class="summary-section">
            <div class="summary-label">AI Summary</div>
            <div class="summary-text">${escapeHtml(data.summary)}</div>
          </div>`;
        }

        html += `</div>`;
        results.insertAdjacentHTML('afterbegin', html);
      }
    } catch (err) {
      document.getElementById(loadingId)?.remove();
      results.insertAdjacentHTML('afterbegin', `
        <div class="error-card">
          ⚠ Could not reach gateway at <strong>${escapeHtml(GATEWAY_URL)}</strong><br>
          <small>Make sure the Worker is deployed and the tunnel is running.</small>
        </div>
      `);
    }

    btn.disabled = false;
    input.focus();
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function syntaxHighlight(obj) {
    const json = JSON.stringify(obj, null, 2);
    return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
      let cls = 'number';
      if (/^"/.test(match)) {
        cls = /:$/.test(match) ? 'key' : 'string';
      } else if (/true|false/.test(match)) {
        cls = 'boolean';
      } else if (/null/.test(match)) {
        cls = 'null';
      }
      const colors = {
        key: '#F6821F',
        string: '#0891B2',
        number: '#10B981',
        boolean: '#A78BFA',
        null: '#EF4444',
      };
      return `<span style="color:${colors[cls]}">${match}</span>`;
    });
  }
</script>

</body>
</html>
